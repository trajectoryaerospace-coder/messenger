<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zanieke & Ayushman Portal</title>
    <style>
        :root {
            --bg-color: #0d0e12;
            --card-color: #161820;
            --accent-color: #ff4757;
            --text-color: #ffffff;
            --muted-color: #8b8d99;
            --success-color: #2ed573;
        }
        body {
            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .container {
            width: 90%;
            max-width: 400px;
            background: var(--card-color);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            box-sizing: border-box;
        }
        h2 { margin-bottom: 5px; font-weight: 600; }
        .subtitle { color: var(--muted-color); font-size: 14px; margin-bottom: 25px; }
        
        input[type="text"] {
            width: 100%;
            padding: 16px;
            margin: 15px 0;
            border: 1px solid #2a2d3d;
            background: #1f222e;
            color: white;
            border-radius: 12px;
            box-sizing: border-box;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }
        input[type="text"]:focus { border-color: var(--accent-color); }
        
        button {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 16px 24px;
            font-size: 16px;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            transition: transform 0.1s, opacity 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        button:active { transform: scale(0.98); }
        
        /* Message Box & Notification Light Configurations */
        .notification-bar {
            background: #1f222e;
            padding: 14px;
            border-radius: 12px;
            margin: 15px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 14px;
            font-weight: 500;
        }
        .status-light {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            transition: background-color 0.4s, box-shadow 0.4s;
        }
        .light-red {
            background-color: var(--accent-color);
            box-shadow: 0 0 10px var(--accent-color);
        }
        .light-green {
            background-color: var(--success-color);
            box-shadow: 0 0 10px var(--success-color);
        }
        
        .message-display-box {
            background: #1a1d29;
            border: 1px dashed #3a3f58;
            border-radius: 12px;
            padding: 20px;
            margin: 15px 0;
            color: #f1f2f6;
            font-size: 18px;
            font-style: italic;
            word-wrap: break-word;
        }
        
        #status {
            margin-top: 20px;
            font-size: 13px;
            color: var(--muted-color);
            background: #1a1d29;
            padding: 10px;
            border-radius: 10px;
        }
        
        .hidden { display: none !important; }
        .logout-btn {
            background: transparent;
            color: var(--muted-color);
            font-size: 12px;
            margin-top: 20px;
            padding: 5px;
            text-decoration: underline;
            font-weight: normal;
        }
    </style>
</head>
<body>

<div id="loginView" class="container">
    <h2>Device Portal Access</h2>
    <div class="subtitle">Enter access token (A or Z)</div>
    <input type="text" id="loginInput" placeholder="Enter character..." maxlength="5">
    <button id="loginBtn">Submit Entry</button>
</div>

<div id="ayushmanView" class="container hidden">
    <h2>Hello Ayushman</h2>
    <div class="subtitle">Transmit over-the-air to Zanieke's Device</div>
    <input type="text" id="ayushmanMsg" placeholder="Type a message for Zanieke...">
    <button id="ayushmanSendBtn">Upload Message to Cloud</button>
    <div id="ayushmanStatus">Status: Awaiting input...</div>
    <button class="logout-btn" id="logoutBtnA">Switch User Profile</button>
</div>

<div id="zaniekeView" class="container hidden">
    <h2>Hello Zanieke</h2>
    <div id="zaniekeSubtitle" class="subtitle">Tap screen to activate automatic reconnection link</div>
    
    <div class="notification-bar">
        <div id="notificationLight" class="status-light light-red"></div>
        <span id="notificationText">No New Message Detected</span>
    </div>

    <div class="subtitle" style="margin-bottom: 5px; text-align: left; padding-left: 5px;">Current Message Payload:</div>
    <div id="messageTextBox" class="message-display-box">Awaiting sync...</div>

    <button id="zaniekeConnectBtn">Pair New Device</button>
    <div id="status">Hardware Status: Offline</div>
    <button class="logout-btn" id="logoutBtnZ">Switch User Profile</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyApxQJFS8Ph-rl6NcTDU3_FiyQ5He_UM6Y",
        authDomain: "the-blob-articles.firebaseapp.com",
        projectId: "the-blob-articles",
        storageBucket: "the-blob-articles.firebasestorage.app",
        messagingSenderId: "546322985129",
        appId: "1:546322985129:web:c8b3bdae4318864893b9b8",
        measurementId: "G-373B7K6SP0"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app, "https://the-blob-articles-default-rtdb.firebaseio.com");

    const SERVICE_UUID = "4fafc201-1fb5-459e-8fcc-c5c9c331914b";
    const CHARACTERISTIC_UUID = "beb5483e-36e1-4688-b7f5-ea07361b26a8";

    let deviceCache = null;
    let characteristicCache = null;
    let currentLiveMessage = ""; 
    let isConnectingBackground = false;
    let lastRenderedTimestamp = 0;

    const views = {
        login: document.getElementById('loginView'),
        ayushman: document.getElementById('ayushmanView'),
        zanieke: document.getElementById('zaniekeView')
    };

    window.addEventListener('load', () => {
        const savedRole = localStorage.getItem('userRole');
        if (savedRole === 'A') showView('ayushman');
        else if (savedRole === 'Z') {
            showView('zanieke');
            initZaniekeDatabaseListener();
        } else showView('login');
    });

    function showView(targetView) {
        Object.keys(views).forEach(key => views[key].classList.add('hidden'));
        views[targetView].classList.remove('hidden');
    }

    document.getElementById('loginBtn').addEventListener('click', () => {
        const rawInput = document.getElementById('loginInput').value.trim().toUpperCase();
        if (rawInput === 'A') {
            localStorage.setItem('userRole', 'A');
            showView('ayushman');
        } else if (rawInput === 'Z') {
            localStorage.setItem('userRole', 'Z');
            showView('zanieke');
            initZaniekeDatabaseListener();
            attemptBackgroundAutoConnect();
        } else {
            alert("Invalid Token. Type 'A' or 'Z'.");
        }
    });

    document.body.addEventListener('click', (e) => {
        if (localStorage.getItem('userRole') === 'Z' && !deviceCache && !isConnectingBackground) {
            if (e.target.id !== 'logoutBtnZ' && e.target.id !== 'loginBtn') {
                attemptBackgroundAutoConnect();
            }
        }
    });

    // --- AUTOMATIC BACKGROUND RECONNECT ENGINE ---
    async function attemptBackgroundAutoConnect() {
        if (!navigator.bluetooth || !navigator.bluetooth.getDevices) return;
        
        const statusDiv = document.getElementById('status');
        isConnectingBackground = true;

        try {
            const devices = await navigator.bluetooth.getDevices();
            const targetDevice = devices.find(d => d.name && d.name.startsWith("Zanieke"));

            if (targetDevice) {
                statusDiv.innerText = "Hardware Status: Reconnecting quietly...";
                setupDeviceListeners(targetDevice);
                const server = await targetDevice.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                characteristicCache = await service.getCharacteristic(CHARACTERISTIC_UUID);
                
                statusDiv.innerText = "Hardware Status: Device Synced Successfully!";
                document.getElementById('zaniekeSubtitle').innerText = "Device auto-linked via background profile!";
                pushMessageToHardware();
            }
        } catch (err) {
            console.log("Background link check bypassed:", err.message);
        } finally {
            isConnectingBackground = false;
        }
    }

    // --- AYUSHMAN PIPELINE ---
    document.getElementById('ayushmanSendBtn').addEventListener('click', async () => {
        const msgText = document.getElementById('ayushmanMsg').value;
        const statusText = document.getElementById('ayushmanStatus');
        if (!msgText) return;

        statusText.innerText = "Status: Uploading payload...";
        try {
            await set(ref(db, 'messages/zanieke'), { 
                text: msgText, 
                timestamp: Date.now() 
            });
            statusText.innerText = "Status: Successfully Sent to Cloud Storage!";
            document.getElementById('ayushmanMsg').value = "";
        } catch (err) {
            statusText.innerText = "Error: " + err.message;
        }
    });

    // --- ZANIEKE DATABASE STREAM (WITH LIGHT NOTIFIER & DISPLAY) ---
    function initZaniekeDatabaseListener() {
        onValue(ref(db, 'messages/zanieke'), (snapshot) => {
            const data = snapshot.val();
            if (data && data.text) {
                currentLiveMessage = data.text;
                
                // RESTORED DISPLAY: The text is visible inside the UI box container
                document.getElementById('messageTextBox').innerText = `"${currentLiveMessage}"`;
                
                // STATUS LIGHT VISUAL MODIFICATION: Turn indicator light green when new data drops
                const lightElement = document.getElementById('notificationLight');
                const lightText = document.getElementById('notificationText');
                
                lightElement.classList.remove('light-red');
                lightElement.classList.add('light-green');
                lightText.innerText = "New Message Received!";

                pushMessageToHardware();
            }
        });
    }

    // Manual pairing sequence handler
    document.getElementById('zaniekeConnectBtn').addEventListener('click', async () => {
        const statusDiv = document.getElementById('status');
        try {
            statusDiv.innerText = "Hardware Status: Opening Bluetooth Scanner...";
            const device = await navigator.bluetooth.requestDevice({
                filters: [{ services: [SERVICE_UUID] }, { namePrefix: "Zanieke" }],
                optionalServices: [SERVICE_UUID]
            });

            setupDeviceListeners(device);
            statusDiv.innerText = `Hardware Status: Establishing link...`;
            const server = await device.gatt.connect();
            const service = await server.getPrimaryService(SERVICE_UUID);
            characteristicCache = await service.getCharacteristic(CHARACTERISTIC_UUID);

            statusDiv.innerText = "Hardware Status: Device Synced Successfully!";
            pushMessageToHardware();
        } catch (error) {
            statusDiv.innerText = "Connection Error: " + error.message;
        }
    });

    function setupDeviceListeners(device) {
        deviceCache = device;
        device.addEventListener('gattserverdisconnected', onDisconnected);
    }

    async function pushMessageToHardware() {
        if (!characteristicCache || !currentLiveMessage) return;
        try {
            const encoder = new TextEncoder();
            await characteristicCache.writeValue(encoder.encode(currentLiveMessage));
        } catch (error) {
            console.error("Hardware stream exception:", error.message);
        }
    }

    function onDisconnected() {
        const statusDiv = document.getElementById('status');
        statusDiv.innerText = "Hardware Status: Offline";
        document.getElementById('zaniekeSubtitle').innerText = "Tap screen to wake automatic link profile";
        
        // Reset notification configurations down to defaults upon system shutdown
        const lightElement = document.getElementById('notificationLight');
        const lightText = document.getElementById('notificationText');
        lightElement.classList.remove('light-green');
        lightElement.classList.add('light-red');
        lightText.innerText = "No New Message Detected";
        
        characteristicCache = null;
        deviceCache = null;
    }

    const runLogout = () => {
        localStorage.clear();
        location.reload();
    };
    document.getElementById('logoutBtnA').addEventListener('click', runLogout);
    document.getElementById('logoutBtnZ').addEventListener('click', runLogout);
</script>

</body>
</html>
